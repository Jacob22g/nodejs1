databases:
  - name: nodejs1-db
    plan: free
    databaseName: nodejs1
    user: nodejs1_user

services:
  - type: web
    plan: free
    name: nodejs1-api
    runtime: node
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nodejs1-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
